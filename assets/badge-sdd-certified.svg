    <text aria-hidden="true" x="1590" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="1100">Don Cheli ✅</text>
    <text x="1590" y="140" transform="scale(.1)" fill="#fff" textLength="1100">Don Cheli ✅</text>
